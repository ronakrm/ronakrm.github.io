<div class="substack-subscribe">
  <p class="substack-subscribe-note">
    {%- if include.note -%}
      {{ include.note }}
    {%- else -%}
      I've started cross-posting these on Substack — subscribe there to get new posts in your inbox: <a href="https://ronakrm.substack.com">ronakrm.substack.com</a>.
    {%- endif -%}
  </p>
  <iframe src="https://ronakrm.substack.com/embed?transparent=1"
          width="480" height="150"
          style="border: 0; background: transparent; max-width: 100%;"
          frameborder="0" scrolling="no"></iframe>
</div>
